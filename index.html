<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MySupervisely | Mental Health Supervision Matching</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        :root {
            --bark: #332211;
            --walnut: #6B5040;
            --linen: #F9F6F0;
            --sage: #7A9B8A;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--linen);
            color: var(--bark);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .container {
            max-width: 650px;
            padding: 2rem;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            font-weight: 700;
            letter-spacing: -0.03em;
        }
        h1 span {
            color: var(--sage);
        }
        p {
            font-size: 1.25rem;
            color: var(--walnut);
            line-height: 1.6;
            margin-bottom: 2.5rem;
            font-weight: 300;
        }
        .btn-group {
            display: flex;
            gap: 1.25rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .btn-primary {
            background-color: var(--walnut);
            color: white;
            box-shadow: 0 4px 6px rgba(107, 80, 64, 0.15);
        }
        .btn-primary:hover {
            background-color: var(--bark);
            transform: translateY(-1px);
        }
        .btn-secondary {
            border: 2px solid var(--walnut);
            color: var(--walnut);
        }
        .btn-secondary:hover {
            background-color: var(--walnut);
            color: white;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>My<span>Supervisely</span></h1>
        <p>Connecting mental health interns with qualified clinical supervisors aligned with their goals, schedule, and career vision.</p>
        
        <div class="btn-group">
            <a href="/intern-form.html" class="btn btn-primary">I'm an Intern</a>
            <a href="/supervisor-form.html" class="btn btn-secondary">I'm a Supervisor</a>
